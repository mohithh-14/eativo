spring.datasource.url=${APP_DB_URL:jdbc:h2:file:./data/tastematchdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${APP_DB_USERNAME:sa}
spring.datasource.password=${APP_DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${APP_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
info.app.name=Eativo Backend
info.app.description=Restaurant discovery, recommendations, reservations, and ordering API
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.auth.session-days=${APP_AUTH_SESSION_DAYS:7}
